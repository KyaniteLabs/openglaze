# Cone 6 Oxidation - Community Edition
# A collection of reliable oxidation glazes for electric kilns
#
# License: CC-BY (Free to use, modify, and share with attribution)

id: cone6-oxidation-community
name: Cone 6 Oxidation (Community)
version: 1.0.0
author: Glaze Lab Community
license: CC-BY-4.0
premium: false

description: |
  A curated collection of 12 reliable cone 6 oxidation glazes.
  Perfect for electric kilns firing to Orton cone 6 (~2232°F / 1222°C).

tags:
  - cone6
  - oxidation
  - mid-range
  - electric-kiln

glazes:
