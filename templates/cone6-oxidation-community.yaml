    cone: "6"
    atmosphere: oxidation
    base_type: transparent
    surface: smooth
    color: clear
    transparency: transparent
    notes: |
      Reliable clear glaze for cone 6 oxidation.
      Works over most commercial underglazes.
    recipe:
      - ingredient: Frit 3134
        amount: 25
        unit: "%"
      - ingredient: Feldspar
        amount: 35
        unit: "%"
      - ingredient: Silica
        amount: 20
        unit: "%"
      - ingredient: Kaolin
        amount: 15
        unit: "%"
      - ingredient: Whiting
        amount: 5
        unit: "%"

