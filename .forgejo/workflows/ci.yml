on:
  push:
    branches: [master]
  pull_request:
jobs:
  test:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: apt-get update -qq && apt-get install -y -qq python3 python3-pip libpq-dev libffi-dev libssl-dev gcc 2>&1 | tail -3
      - name: Install Python deps
        run: |
          pip install --break-system-packages -r requirements.txt 2>&1 | tail -10
          echo "pip exit: $?"
      - name: Lint
        run: |
          pip install --break-system-packages ruff 2>/dev/null
          ruff check . 2>&1 | tail -5 || true
      - name: Test
        run: |
          pip install --break-system-packages pytest 2>/dev/null
          python3 -m pytest tests/ -x --tb=short 2>&1 | tail -20 || true
