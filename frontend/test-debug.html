<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Debug Test</title>
</head>
<body>
    <h1>Data Debug</h1>
    <pre id="debug-output"></pre>
    <script>
        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', () => {
            const debug = document.getElementById('debug-output');

            // Check DATA
            debug.innerHTML += 'Checking window.DATA...\\n';
            debug.innerHTML += 'window.DATA exists: ' + (window.DATA ? 'YES' : 'No') + '\\n';

            if (window.DATA) {
                debug.innerHTML += 'glazes: ' + JSON.stringify(window.DATA.glazes?.length) + '\\n';
                debug.innerHTML += 'proven: ' + JSON.stringify(window.DATA.proven?.length) + '\\n';
                debug.innerHTML += 'hypothesis: ' + JSON.stringify(window.DATA.hypothesis?.length) + '\\n';
                debug.innerHTML += '\\n';
                debug.innerHTML += 'state.combinations: ' + JSON.stringify(state.combinations?.length) + '\\n';
                debug.innerHTML += 'state.currentStage: ' + state.currentStage + '\\n';
                debug.innerHTML += 'state.glazes: ' + JSON.stringify(state.glazes?.length) + '\\n';
            } else {
                debug.innerHTML += 'ERROR: window.DATA not found!\\n';
            }
        });
    </script>
    <script src="scripts/data.js"></script>
    <script src="scripts/components/GlazeSwatch.js"></script>
    <script src="scripts/components/ComboCard.js"></script>
    <script src="scripts/components/StageBar.js"></script>
    <script src="scripts/components/KamaPanel.js"></script>
    <script src="scripts/components/PredictionModal.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
