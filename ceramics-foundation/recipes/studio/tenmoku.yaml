name: Tenmoku (Standard)
source: Traditional glaze type - Cone 10 Reduction
cone: "10"
atmosphere: reduction
recipe:
  - material: Potash Feldspar (Custer)
    amount: 46.32
  - material: Kaolin (EPK or OM4)
    amount: 13.68
  - material: Silica
    amount: 26.32
  - material: Whiting
    amount: 13.68
additions:
  - material: Red Iron Oxide
    amount: 8.42
    notes: Range 8-12% for darker results
color: Dark brown to black
surface: Gloss
notes: |
  Classic high-iron reduction glaze.
  - Dark base with amber/rust runs at edges (breaking)
  - High iron content (8-10%) creates characteristic color
  - Oil spot effects possible with oxidation firing
  - Named after Japanese temples (Tenmoku = Tianmu mountains)
  - Works well over slips or on textured surfaces
food_safe: true
tested: false
date_documented: "2026-03-15"
references:
  - https://ceramicartsnetwork.org/ceramic-recipes/recipe/Temmoku-Glaze-143148
  - https://digitalfire.com/glossary/tenmoku
  - Glazy.org
