name: Celadon (Standard)
source: Traditional Chinese/Korean glaze
cone: "10"
atmosphere: reduction
recipe:
  - material: Custer Feldspar
    amount: 27.70
  - material: Whiting
    amount: 19.80
  - material: EPK Kaolin
    amount: 19.80
  - material: Silica
    amount: 32.70
additions:
  - material: Iron Oxide
    amount: 0.90
    notes: 0.5-2% for color variation
color: Pale green (celadon green)
surface: Gloss, translucent
notes: |
  Traditional celadon glaze - iron oxide in reduction creates green color.
  - Translucent quality shows clay body beneath
  - Works best on dark clay bodies
  - Reduction required for green development
  - Named for French sinologist's green glaze
  - One of oldest ceramic glaze types
