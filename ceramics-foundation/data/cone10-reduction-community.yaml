  - name: Copper Red
    cone: "10"
    atmosphere: reduction
    base_type: glossy
    surface: smooth
    color: red
    transparency: semi-opaque
    notes: |
      Classic oxblood copper red.
      Requires heavy reduction for red color development.
      Thin areas may turn green or clear.
    recipe:
      - ingredient: Potash Feldspar
        amount: 42
        unit: "%"
      - ingredient: Silica
