  # ==========================================================================

  - name: Black Matte
    cone: "10"
    atmosphere: reduction
    base_type: matte
    surface: smooth
    color: black
    transparency: opaque
    notes: |
      Satin black matte with subtle sheen.
      Good for dramatic contrast with glossy glazes.
    recipe:
      - ingredient: Potash Feldspar
        amount: 40
        unit: "%"
      - ingredient: Whiting
        amount: 20
        unit: "%"
      - ingredient: Kaolin
        amount: 15
        unit: "%"
      - ingredient: Talc
        amount: 10
        unit: "%"
      - ingredient: Cobalt Carbonate
